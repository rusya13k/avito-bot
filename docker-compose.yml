# docker-compose.yml
version: '3.8'

services:
  bot:
    build: .
    container_name: avito_bot
    restart: unless-stopped
    stop_grace_period: 35s
    env_file:
      - .env
    volumes:
      - ./config.json:/app/config.json:ro
      - ./accounts.json:/app/accounts.json:ro
      - ./accounts:/app/accounts
      - ./avito_bot.db:/app/avito_bot.db
      - ./prompts:/app/prompts:ro
    network_mode: host
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('avito_bot.db') else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
